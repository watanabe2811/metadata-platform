# Collector configuration — overrides built-in defaults.
# Priority: environment variables > this file > hardcoded defaults.
#
# All keys map directly to the corresponding Settings field name.
# Rename this file or set METADATA_CONFIG_FILE to use a different path.

# --- Database ---
metadata_db_url: postgresql://metadata:metadata@localhost:5432/metadata
db_pool_min_size: 2
db_pool_max_size: 10

# --- API server ---
api_host: "0.0.0.0"
api_port: 8080
api_prefix: /api/v1

# --- Auth (set auth_required: true and change token in production) ---
auth_required: false
auth_service_token: dev-token-change-me

# --- Logging ---
log_level: INFO

# --- Lineage traversal ---
max_lineage_depth: 10
default_lineage_depth: 3
